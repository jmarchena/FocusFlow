name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl create "CI-iPhone" "iPhone 17 Pro" "com.apple.CoreSimulator.SimRuntime.iOS-26-2")
          xcrun simctl boot "$UDID"
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl bootstatus "$UDID" -b

      - name: Build
        run: |
          xcodebuild build \
            -project FocusFlow.xcodeproj \
            -scheme FocusFlow \
            -destination "id=$SIMULATOR_UDID" \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project FocusFlow.xcodeproj \
            -scheme FocusFlow \
            -destination "id=$SIMULATOR_UDID" \
            CODE_SIGNING_ALLOWED=NO
