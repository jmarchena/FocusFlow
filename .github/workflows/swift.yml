name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build
        run: |
          xcodebuild build \
            -project FocusFlow.xcodeproj \
            -scheme FocusFlow \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project FocusFlow.xcodeproj \
            -scheme FocusFlow \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            CODE_SIGNING_ALLOWED=NO
